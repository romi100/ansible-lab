---
- name: Install metrics-server and k9s on K3s master
  hosts: k3s_master
  become: yes

  tasks:

    - name: Download metrics-server manifest
      ansible.builtin.get_url:
        url: https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
        dest: /tmp/metrics-server.yaml

    - name: Apply metrics-server manifest
      ansible.builtin.command: kubectl apply -f /tmp/metrics-server.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Patch metrics-server to allow insecure TLS (required for K3s)
      ansible.builtin.command: >
        kubectl patch deployment metrics-server -n kube-system
        --type='json'
        -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for metrics-server to become ready
      ansible.builtin.command: kubectl rollout status deployment/metrics-server -n kube-system
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Install k9s binary
      ansible.builtin.shell: |
        curl -sS https://webinstall.dev/k9s | bash
      args:
        executable: /bin/bash
      become_user: vboxuser

    - name: Add k9s PATH to bashrc
      ansible.builtin.lineinfile:
        path: /home/vboxuser/.bashrc
        line: 'source ~/.config/envman/PATH.env'
        insertafter: EOF
      become_user: vboxuser

    - name: Verify metrics-server (kubectl top nodes)
      ansible.builtin.command: kubectl top nodes
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: metrics_output
      ignore_errors: yes

    - name: Show metrics-server output
      ansible.builtin.debug:
        var: metrics_output.stdout
