---
- name: Install K3s master node
  hosts: k3s_master
  become: yes

  tasks:
    - name: Install K3s master
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Get K3s node token
      command: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Save token for workers
      set_fact:
        k3s_master_token: "{{ k3s_token.stdout }}"

    - name: Get master IP
      command: hostname -I
      register: master_ip_raw

    - name: Save master IP
      set_fact:
        k3s_master_ip: "{{ master_ip_raw.stdout.split()[0] }}"


- name: Install K3s worker nodes
  hosts: k3s_worker
  become: yes

  vars:
    k3s_url: "https://{{ hostvars[groups['k3s_master'][0]].k3s_master_ip }}:6443"
    k3s_token: "{{ hostvars[groups['k3s_master'][0]].k3s_master_token }}"

  tasks:
    - name: Install K3s worker
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL={{ k3s_url }} K3S_TOKEN={{ k3s_token }} sh -
      args:
        creates: /usr/local/bin/k3s-agent

