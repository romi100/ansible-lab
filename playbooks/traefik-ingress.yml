---
- name: Create Traefik Ingress for nginx
  hosts: k3s_master
  become: yes

  tasks:

    - name: Create ingress resource
      ansible.builtin.copy:
        dest: /tmp/nginx-ingress.yaml
        content: |
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: nginx-ingress
            namespace: default
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web
          spec:
            rules:
            - host: nginx.local
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: nginx
                      port:
                        number: 80

    - name: Apply ingress
      ansible.builtin.command: kubectl apply -f /tmp/nginx-ingress.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
